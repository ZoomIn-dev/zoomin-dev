<svg width="880" height="300" viewBox="0 0 880 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes cardPop {
        0%   { opacity:0; transform:scale(0.85) translateY(16px); }
        22%  { opacity:1; transform:scale(1) translateY(0); }
        76%  { opacity:1; transform:scale(1) translateY(0); }
        94%  { opacity:0; transform:scale(0.85) translateY(8px); }
        100% { opacity:0; transform:scale(0.85) translateY(16px); }
      }
      @keyframes labelIn {
        0%   { opacity:0; transform:translateY(-12px); }
        18%  { opacity:1; transform:translateY(0); }
        82%  { opacity:1; transform:translateY(0); }
        96%  { opacity:0; transform:translateY(-8px); }
        100% { opacity:0; transform:translateY(-12px); }
      }
      @keyframes glowPulse { 0%,100%{opacity:0.15;} 50%{opacity:0.4;} }
      .lbl  { animation: labelIn 10s cubic-bezier(0.25,0.46,0.45,0.94) 0.08s infinite; opacity:0; }
      .c1   { animation: cardPop 10s cubic-bezier(0.34,1.56,0.64,1) 0.18s infinite; opacity:0; }
      .c2   { animation: cardPop 10s cubic-bezier(0.34,1.56,0.64,1) 0.38s infinite; opacity:0; }
      .c3   { animation: cardPop 10s cubic-bezier(0.34,1.56,0.64,1) 0.58s infinite; opacity:0; }
      .c4   { animation: cardPop 10s cubic-bezier(0.34,1.56,0.64,1) 0.78s infinite; opacity:0; }
      .c5   { animation: cardPop 10s cubic-bezier(0.34,1.56,0.64,1) 0.98s infinite; opacity:0; }
      .c6   { animation: cardPop 10s cubic-bezier(0.34,1.56,0.64,1) 1.18s infinite; opacity:0; }
      .glow { animation: glowPulse 4s cubic-bezier(0.42,0,0.58,1) infinite; }
    </style>
    <linearGradient id="bgS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F4FF"/>
      <stop offset="100%" stop-color="#EDE5FF"/>
    </linearGradient>
    <linearGradient id="accentS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="lineS" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#8B5CF6"/>
      <stop offset="60%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F0FF"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#8B5CF6" flood-opacity="0.14"/>
    </filter>
  </defs>

