<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);transition:background .4s,color .4s}

.light{
  --bg:#F0EBFF;
  --surface:#FFFFFF;
  --text:#1E1040;
  --muted:#6D28D9;
  --accent:#7C3AED;
  --accent2:#A78BFA;
  --pill-bg:rgba(124,58,237,0.13);
  --pill-border:rgba(124,58,237,0.45);
  --card-bg:#FFFFFF;
  --card-border:rgba(139,92,246,0.35);
  --card-side:#8B5CF6;
  --card-side2:#7C3AED;
  --dot:#8B5CF6;
  --logo-top:#8B5CF6;
  --logo-top2:#A78BFA;
  --logo-bot:#2D1B69;
  --logo-bot2:#3B2080;
  --hash-a:#7C3AED;
  --hash-b:#A78BFA;
  --tag-bg:rgba(124,58,237,0.12);
  --tag-text:#4C1D95;
  --tag-border:rgba(124,58,237,0.4);
  --step-active:#DDD6FE;
  --step-active-border:#7C3AED;
  --line-a:#8B5CF6;
  --line-b:#7C3AED;
  --svgbg1:#F5F0FF;
  --svgbg2:#EDE5FF;
  --body-text:#4C1D95;
  --sub-text:rgba(109,40,217,0.65);
  --arc:#7C3AED;
}
.dark{
  --bg:#0A0818;
  --surface:#130F2A;
  --text:#F0EEFF;
  --muted:#A78BFA;
  --accent:#8B5CF6;
  --accent2:#C4B5FD;
  --pill-bg:rgba(139,92,246,0.18);
  --pill-border:rgba(139,92,246,0.5);
  --card-bg:#1A1530;
  --card-border:rgba(139,92,246,0.4);
  --card-side:#8B5CF6;
  --card-side2:#7C3AED;
  --dot:#8B5CF6;
  --logo-top:#8B5CF6;
  --logo-top2:#A78BFA;
  --logo-bot:#1E1040;
  --logo-bot2:#2D1B69;
  --hash-a:#8B5CF6;
  --hash-b:#C4B5FD;
  --tag-bg:rgba(139,92,246,0.2);
  --tag-text:#C4B5FD;
  --tag-border:rgba(139,92,246,0.5);
  --step-active:#2D1F60;
  --step-active-border:#A78BFA;
  --line-a:#8B5CF6;
  --line-b:#A78BFA;
  --svgbg1:#0F0D1A;
  --svgbg2:#130F2A;
  --body-text:#A78BFA;
  --sub-text:rgba(167,139,250,0.7);
  --arc:#A78BFA;
}

.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;
  background:var(--surface);
  border-bottom:1.5px solid var(--pill-border);
  position:sticky;top:0;z-index:10;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:36px;height:36px}
.brand-name{font-size:18px;font-weight:800;color:var(--text)}
.brand-name span{color:var(--accent)}
.toggle-wrap{display:flex;align-items:center;gap:12px}
.toggle-label{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1.5px}
.toggle{
  position:relative;width:72px;height:36px;
  background:var(--pill-bg);
  border:1.5px solid var(--pill-border);
  border-radius:18px;cursor:pointer;
  transition:background .3s,border-color .3s;
  display:flex;align-items:center;padding:3px;
}
.toggle .knob{
  width:28px;height:28px;border-radius:50%;
  background:var(--accent);
  transition:transform .3s,background .3s;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.dark .toggle .knob{transform:translateX(36px)}
.light .toggle .knob{transform:translateX(0)}

.dl-btn{
  padding:8px 18px;border-radius:20px;
  background:var(--accent);color:#fff;
  border:none;cursor:pointer;
  font-size:13px;font-weight:700;letter-spacing:.5px;
  transition:opacity .2s,transform .15s;
}
.dl-btn:hover{opacity:.85;transform:scale(1.03)}

.banners{padding:24px 20px;display:flex;flex-direction:column;gap:6px}

.banner-label{
  font-size:10px;font-weight:700;letter-spacing:2px;
  color:var(--muted);padding:4px 0 2px 4px;
  text-transform:uppercase;
}

svg.banner{width:100%;border-radius:10px;display:block;overflow:hidden;transition:all .4s}

/* SVG theming via CSS custom properties inherited */
.banner .bg-rect{fill:var(--svgbg1);}
.banner .bg-rect2{fill:var(--svgbg2);}
.banner text.main{fill:var(--text)}
.banner text.accent{fill:var(--accent)}
.banner text.accent2{fill:var(--accent2)}
.banner text.muted{fill:var(--body-text)}
.banner text.sub{fill:var(--sub-text)}
.banner text.tag-t{fill:var(--tag-text)}
.banner .logo-top{fill:var(--logo-top)}
.banner .logo-top2{fill:var(--logo-top2)}
.banner .logo-bot{fill:var(--logo-bot)}
.banner .logo-bot2{fill:var(--logo-bot2)}
.banner .card-bg{fill:var(--card-bg)}
.banner .card-side{fill:var(--card-side)}
.banner .card-side2{fill:var(--card-side2)}
.banner .card-bord{stroke:var(--card-border)}
.banner .tag-bg{fill:var(--tag-bg);stroke:var(--tag-border)}
.banner .dot-c{fill:var(--dot)}
.banner .step-active{fill:var(--step-active);stroke:var(--step-active-border);stroke-width:2}
.banner .arc-path{stroke:var(--arc)}
.banner .arr-path{stroke:var(--arc)}
.banner .line-grad stop.la{stop-color:var(--line-a)}
.banner .line-grad stop.lb{stop-color:var(--line-b)}
.banner .hash-a{fill:var(--hash-a)}
.banner .hash-b{fill:var(--hash-b)}
.banner .pill-bg{fill:var(--pill-bg);stroke:var(--pill-border)}

/* Animations — all 6s loop */
@keyframes fsi{0%{opacity:0;transform:translateY(16px)}18%{opacity:1;transform:translateY(0)}82%{opacity:1;transform:translateY(0)}98%{opacity:0;transform:translateY(-8px)}100%{opacity:0;transform:translateY(16px)}}
@keyframes pop6{0%{opacity:0;transform:scale(.84)}18%{opacity:1;transform:scale(1)}82%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.84)}}
@keyframes db{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes lp{0%{opacity:0;stroke-dashoffset:120}25%{opacity:.7;stroke-dashoffset:0}75%{opacity:.7;stroke-dashoffset:0}100%{opacity:0;stroke-dashoffset:120}}
@keyframes ad{0%{opacity:0;stroke-dashoffset:40}20%{opacity:1;stroke-dashoffset:0}80%{opacity:1;stroke-dashoffset:0}100%{opacity:0;stroke-dashoffset:40}}
@keyframes hashAnim{0%,100%{opacity:.8}50%{opacity:1}}

.a1{animation:fsi 6s .10s ease-in-out infinite;opacity:0}
.a2{animation:fsi 6s .30s ease-in-out infinite;opacity:0}
.a3{animation:fsi 6s .50s ease-in-out infinite;opacity:0}
.a4{animation:fsi 6s .70s ease-in-out infinite;opacity:0}
.logo6{animation:pop6 6s .05s ease-in-out infinite;opacity:0}
.c1{animation:pop6 6s .12s ease-in-out infinite;opacity:0}
.c2{animation:pop6 6s .26s ease-in-out infinite;opacity:0}
.c3{animation:pop6 6s .40s ease-in-out infinite;opacity:0}
.c4{animation:pop6 6s .54s ease-in-out infinite;opacity:0}
.c5{animation:pop6 6s .68s ease-in-out infinite;opacity:0}
.c6{animation:pop6 6s .82s ease-in-out infinite;opacity:0}
.s1{animation:fsi 6s .10s ease-in-out infinite;opacity:0}
.s2{animation:fsi 6s .24s ease-in-out infinite;opacity:0}
.s3{animation:fsi 6s .38s ease-in-out infinite;opacity:0}
.s4{animation:fsi 6s .52s ease-in-out infinite;opacity:0}
.s5{animation:fsi 6s .66s ease-in-out infinite;opacity:0}
.s6{animation:fsi 6s .80s ease-in-out infinite;opacity:0}
.d1{animation:db 6s .0s ease-in-out infinite}
.d2{animation:db 6s .5s ease-in-out infinite}
.d3{animation:db 6s 1s ease-in-out infinite}
.d4{animation:db 6s 1.5s ease-in-out infinite}
.d5{animation:db 6s 2s ease-in-out infinite}
.d6{animation:db 6s 2.5s ease-in-out infinite}
.loop6{stroke-dasharray:10 6;animation:lp 6s .9s ease-in-out infinite;opacity:0}
.arr1{stroke-dasharray:40;animation:ad 6s .18s ease-in-out infinite;opacity:0}
.arr2{stroke-dasharray:40;animation:ad 6s .32s ease-in-out infinite;opacity:0}
.arr3{stroke-dasharray:40;animation:ad 6s .46s ease-in-out infinite;opacity:0}
.arr4{stroke-dasharray:40;animation:ad 6s .60s ease-in-out infinite;opacity:0}
.arr5{stroke-dasharray:40;animation:ad 6s .74s ease-in-out infinite;opacity:0}
.hashanim{animation:hashAnim 3s ease-in-out infinite}
</style>
</head>

<script>
let isDark = false;

function switchTheme() {
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  document.getElementById('mode-label').textContent = isDark ? 'DARK' : 'LIGHT';
  document.getElementById('knob').textContent = isDark ? '🌙' : '☀️';
}

function svgToDataURL(svgEl) {
  const clone = svgEl.cloneNode(true);
  const cs = getComputedStyle(document.body);
  const vars = ['--svgbg1','--svgbg2','--text','--accent','--accent2','--muted','--body-text','--sub-text',
    '--tag-bg','--tag-text','--tag-border','--card-bg','--card-border','--card-side','--card-side2',
    '--dot','--logo-top','--logo-top2','--logo-bot','--logo-bot2','--step-active','--step-active-border',
    '--arc','--hash-a','--hash-b','--pill-bg','--pill-border','--line-a','--line-b'];
  const resolved = {};
  vars.forEach(v => resolved[v] = cs.getPropertyValue(v).trim());

  const style = document.createElement('style');
  style.textContent = `
    .bg-rect{fill:${resolved['--svgbg1']}}
    .bg-rect2{fill:${resolved['--svgbg2']}}
    text.main{fill:${resolved['--text']}}
    text.accent{fill:${resolved['--accent']}}
    text.accent2{fill:${resolved['--accent2']}}
    text.muted{fill:${resolved['--body-text']}}
    text.sub{fill:${resolved['--sub-text']}}
    text.tag-t{fill:${resolved['--tag-text']}}
    .dot-c{fill:${resolved['--dot']}}
    .logo-top{fill:${resolved['--logo-top']}}
    .logo-top2{fill:${resolved['--logo-top2']}}
    .logo-bot{fill:${resolved['--logo-bot']}}
    .logo-bot2{fill:${resolved['--logo-bot2']}}
    .card-bg{fill:${resolved['--card-bg']}}
    .card-bord{stroke:${resolved['--card-border']}}
    .card-side{fill:${resolved['--card-side']}}
    .card-side2{fill:${resolved['--card-side2']}}
    .tag-bg{fill:${resolved['--tag-bg']};stroke:${resolved['--tag-border']};stroke-width:1.5}
    .step-active{fill:${resolved['--step-active']};stroke:${resolved['--step-active-border']};stroke-width:2}
    .arc-path,.arr-path{stroke:${resolved['--arc']}}
    .la{stop-color:${resolved['--line-a']}}
    .lb{stop-color:${resolved['--line-b']}}
    .pill-bg{fill:${resolved['--pill-bg']};stroke:${resolved['--pill-border']};stroke-width:1.5}
    .hashanim{fill:${resolved['--accent']}}
  `;
  clone.insertBefore(style, clone.firstChild);

  const allG = clone.querySelectorAll('.a1,.a2,.a3,.a4,.logo6,.c1,.c2,.c3,.c4,.c5,.c6,.s1,.s2,.s3,.s4,.s5,.s6');
  allG.forEach(g => { g.style.opacity = '1'; g.style.animation = 'none'; g.style.transform = 'none'; });
  const dots = clone.querySelectorAll('.d1,.d2,.d3,.d4,.d5,.d6');
  dots.forEach(d => { d.style.opacity = '1'; d.style.animation = 'none'; });
  const loops = clone.querySelectorAll('.loop6,.arr1,.arr2,.arr3,.arr4,.arr5');
  loops.forEach(l => { l.style.opacity = '1'; l.style.animation = 'none'; l.style.strokeDashoffset = '0'; });

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(clone);
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
}

function downloadAll() {
  const banners = document.querySelectorAll('svg.banner');
  const names = ['header','about','services','workflow','footer'];
  const theme = isDark ? 'dark' : 'light';
  banners.forEach((svg, i) => {
    setTimeout(() => {
      const url = svgToDataURL(svg);
      const a = document.createElement('a');
      a.href = url;
      a.download = `zoomin-${names[i]}-${theme}.svg`;
      a.click();
    }, i * 300);
  });
}
</script>
