      </g>
  <g class="chip6">
        <rect x="640" y="134" width="83" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="681.5" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">FASTAPI</text>
      </g>
  <g class="chip7">
