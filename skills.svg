<svg xmlns="http://www.w3.org/2000/svg" width="800" height="238" viewBox="0 0 800 238">
  <style>
    text { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    @keyframes chip0 { 0%,0% { opacity: 0; transform: translateY(6px) } 2%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip1 { 0%,3% { opacity: 0; transform: translateY(6px) } 5%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip2 { 0%,5% { opacity: 0; transform: translateY(6px) } 7%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip3 { 0%,8% { opacity: 0; transform: translateY(6px) } 10%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip4 { 0%,10% { opacity: 0; transform: translateY(6px) } 12%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip5 { 0%,13% { opacity: 0; transform: translateY(6px) } 15%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip6 { 0%,15% { opacity: 0; transform: translateY(6px) } 17%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip7 { 0%,18% { opacity: 0; transform: translateY(6px) } 20%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    .chip0 { animation: chip0 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip1 { animation: chip1 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip2 { animation: chip2 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip3 { animation: chip3 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip4 { animation: chip4 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip5 { animation: chip5 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip6 { animation: chip6 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip7 { animation: chip7 7s ease-out infinite; transform-origin: center; transform-box: fill-box; }
  </style>
  <rect width="100%" height="100%" fill="#0d0d10" rx="14" ry="14"/>

  <!-- Accent bar -->
  <rect x="56" y="74" width="56" height="3" rx="1.5" fill="#dc2626"/>

